# the conda build parameters to use
build_parameters:
  - "--suppress-variables"  # [(linux and x86_64) and (cuda_compiler_version != "None")]
  - "--skip-existing"  # [(linux and x86_64) and (cuda_compiler_version != "None")]
  - "--error-overlinking"  # [(linux and x86_64) and (cuda_compiler_version != "None")]
  - "--no-test"  # [(linux and x86_64) and (cuda_compiler_version != "None")]
